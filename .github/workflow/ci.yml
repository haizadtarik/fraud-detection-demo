name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps (OpenMP for LightGBM)
        run: sudo apt-get update && sudo apt-get install -y libgomp1

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Generate tiny artifacts for tests
        run: |
          make data          # builds features from the committed SAMPLE (no Kaggle needed)
          python -m fraud_detection.pipelines.training_pipeline --source sample

      - name: Run tests
        run: pytest -v

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Generate artifacts the image needs
        run: |
          sudo apt-get update && sudo apt-get install -y libgomp1
          pip install -e .
          make data
          python -m fraud_detection.pipelines.training_pipeline --source sample
      - name: Build Docker image
        run: docker build -t fraud-detection:ci .
